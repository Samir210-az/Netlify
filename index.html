<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AN Psixoloji Dəstək</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f7fa; }
   .header { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
   .header h1 { margin: 0; font-size: 20px; }
   .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
   .tab { padding: 10px 15px; background: white; border: none; border-radius: 8px; cursor: pointer; }
   .tab.active { background: #2563eb; color: white; }
   .tab-content { display: none; }
   .tab-content.active { display: block; }
   .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
    #geminiBtn { background: #2563eb; color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; margin: 10px 0; }
    #geminiBtn:disabled { background: #9ca3af; cursor: not-allowed; }
    #geminiResult { margin-top: 15px; padding: 15px; background: #f9fafb; border-radius: 8px; border: 1px solid #e5e7eb; min-height: 50px; white-space: pre-wrap; }
   .error { color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 6px; }
    select, button { padding:8px 12px; border-radius:6px; border:1px solid #ccc; margin: 5px 0; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🧠 AN Psixoloji Dəstək və Reabilitasiya Mərkəzi</h1>
    <p>Peşəkar Məlumat Bazası + Gemini AI | Bütün domenlər işlək</p>
  </div>

  <div class="tabs">
    <button class="tab" onclick="openTab('ushaq')">👧</button>
    <button class="tab" onclick="openTab('qeyd')">📝</button>
    <button class="tab active" onclick="openTab('hesabat')">📊 Hesabat & AI</button>
    <button class="tab" onclick="openTab('yukle')">⬇️</button>
    <button class="tab" onclick="openTab('bot')">🤖</button>
  </div>

  <div id="ushaq" class="tab-content">
    <div class="card">Uşaq məlumatları bölməsi</div>
  </div>

  <div id="qeyd" class="tab-content">
    <div class="card">Qeydiyyat bölməsi</div>
  </div>

  <div id="hesabat" class="tab-content active">
    <div class="card">
      <h2>📈 AI əsaslı hesabat</h2>
      <select id="ushaqSec">
        <option>Əli Əliyev (Autizm)</option>
      </select>
      <button>📊 Statistik hesabat</button>

      <button id="geminiBtn" onclick="generateGeminiPlan()">✨ Gemini AI ilə həftəlik plan yarat</button>
      <div id="geminiResult"></div>
    </div>
  </div>

  <div id="yukle" class="tab-content">
    <div class="card">Yükləmə bölməsi</div>
  </div>

  <div id="bot" class="tab-content">
    <div class="card">Bot bölməsi</div>
  </div>

<script>
function openTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tabName).classList.add('active');
  event.currentTarget.classList.add('active');
}

async function generateGeminiPlan() {
  const btn = document.getElementById('geminiBtn');
  const resultDiv = document.getElementById('geminiResult');
  const ushaq = document.getElementById('ushaqSec').value;

  btn.disabled = true;
  btn.innerHTML = '⏳ Plan yaradılır...';
  resultDiv.innerHTML = '';
  resultDiv.className = '';

  try {
    const res = await fetch('/.netlify/functions/gemini', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: `${ushaq} üçün 1 həftəlik sadə reabilitasiya planı yaz. 7 günə böl. Hər gün üçün 2-3 fəaliyyət yaz.`
      })
    });

    const data = await res.json();
    console.log('Gemini cavabı:', data); // Debug üçün

    if (data.error) {
      throw new Error(data.error.message || JSON.stringify(data.error));
    }

    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;

    if (!text) {
      throw new Error('Gemini cavab qaytarmadı. Səb: ' + JSON.stringify(data.promptFeedback || data));
    }

    resultDiv.innerHTML = text.replace(/\n/g, '<br>');

  } catch (err) {
    resultDiv.innerHTML = `Xəta: ${err.message}`;
    resultDiv.className = 'error';
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ Gemini AI ilə həftəlik plan yarat';
  }
}
</script>

</body>
</html>
