<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AN Psixoloji Dəstək</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f7fa; }
   .header { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
   .header h1 { margin: 0; font-size: 20px; }
   .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
   .tab { padding: 10px 15px; background: white; border: none; border-radius: 8px; cursor: pointer; }
   .tab.active { background: #2563eb; color: white; }
   .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    #geminiBtn { background: #2563eb; color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; margin: 10px 0; }
    #geminiBtn:disabled { background: #9ca3af; cursor: not-allowed; }
    #geminiResult { margin-top: 15px; padding: 15px; background: #f9fafb; border-radius: 8px; border: 1px solid #e5e7eb; min-height: 50px; white-space: pre-wrap; }
   .error { color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 6px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🧠 AN Psixoloji Dəstək və Reabilitasiya Mərkəzi</h1>
    <p>Peşəkar Məlumat Bazası + Gemini AI | Bütün domenlər işlək</p>
  </div>

  <div class="tabs">
    <button class="tab">👧</button>
    <button class="tab">📝</button>
    <button class="tab active">📊 Hesabat & AI</button>
    <button class="tab">⬇️</button>
    <button class="tab">🤖</button>
  </div>

  <div class="card">
    <h2>📈 AI əsaslı hesabat</h2>
    <select style="padding:8px; border-radius:6px; border:1px solid #ccc; margin: 10px 0;">
      <option>Əli Əliyev (Autizm)</option>
    </select>
    <button style="padding:8px 12px; border-radius:6px; border:1px solid #ccc; background:white;">📊 Statistik hesabat</button>

    <button id="geminiBtn" onclick="generateGeminiPlan()">✨ Gemini AI ilə həftəlik plan yarat</button>
    <div id="geminiResult"></div>
  </div>

<script>
async function generateGeminiPlan() {
  const btn = document.getElementById('geminiBtn');
  const resultDiv = document.getElementById('geminiResult');

  btn.disabled = true;
  btn.innerHTML = '⏳ Plan yaradılır...';
  resultDiv.innerHTML = '';
  resultDiv.className = '';

  try {
    const res = await fetch('/.netlify/functions/gemini', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: 'Əli Əliyev adlı 8 yaşlı, autizmli uşaq üçün 1 həftəlik fərdi reabilitasiya planı yaz. Günlərə böl. Sadə dildə yaz.'
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error?.message || data.message || 'Server xətası');
    }

    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;

    if (!text) {
      throw new Error('Gemini cavab qaytarmadı. API açarı və ya modeli yoxlayın.');
    }

    resultDiv.innerHTML = text.replace(/\n/g, '<br>');

  } catch (err) {
    resultDiv.innerHTML = `Xəta: ${err.message}`;
    resultDiv.className = 'error';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ Gemini AI ilə həftəlik plan yarat';
  }
}
</script>

</body>
</html>
